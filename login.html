<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>EduVerify | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#020617] flex items-center justify-center min-h-screen">
    <div class="glass-panel p-10 rounded-3xl w-full max-w-md shadow-2xl border border-white/10">
        <h2 class="text-2xl font-black text-center mb-8 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">NODE ACCESS</h2>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Username (admin_alpha or admin_beta)" class="form-input">
            <input id="pass" type="password" placeholder="Password" class="form-input">
            <button onclick="doLogin()" class="w-full py-4 bg-blue-600 rounded-2xl font-bold text-white shadow-xl hover:bg-blue-500 transition-all">Authenticate Node</button>
        </div>
    </div>
    <script>
        async function doLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            if(res.ok) window.location.reload();
            else alert("Invalid Credentials");
        }
    </script>
</body>
</html>
